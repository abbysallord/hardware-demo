<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Stylized Geometric B2B Construction Icon for Apex Build Mart -->
  <!-- Outer Hexagonal Frame representing an industrial bolt/nut -->
  <polygon points="256,35 447,145 447,365 256,475 65,365 65,145" fill="none" stroke="#ff6400" stroke-width="32" stroke-linejoin="round"/>
  
  <!-- Glowing inner architectural beams forming the letter 'A' -->
  <!-- Left supporting beam -->
  <line x1="256" y1="110" x2="150" y2="390" stroke="#f3f4f6" stroke-width="36" stroke-linecap="round"/>
  <!-- Right supporting beam -->
  <line x1="256" y1="110" x2="362" y2="390" stroke="#f3f4f6" stroke-width="36" stroke-linecap="round"/>
  
  <!-- Horizontal tie beam with rivet joints -->
  <line x1="185" y1="290" x2="327" y2="290" stroke="#ff8c00" stroke-width="36" stroke-linecap="round"/>
  
  <!-- Structural apex joint rivet -->
  <circle cx="256" cy="110" r="28" fill="#ff6400"/>
  
  <!-- Subtle glowing orange ambient circle in the center background -->
  <circle cx="256" cy="256" r="60" fill="#ff6400" opacity="0.15" filter="blur(8px)"/>
</svg>